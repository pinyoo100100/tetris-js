<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris JS</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #030712;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      canvas {
        display: block;
        transform-origin: top center;
      }
      .hint {
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
        max-width: 520px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <canvas id="game"></canvas>
      <div class="hint">
        Controls: ←/→ move · ↓ soft drop · Space hard drop · Z/X rotate · C hold · Esc pause ·
        Enter start
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
